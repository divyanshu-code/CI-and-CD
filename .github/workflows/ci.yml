# 2) for CD never ever hardcode the deploy hook url in the ci.yml file because it is a secret and it should be stored in the repository secrets. so we have to create a secret in the repository settings and we have to store the deploy hook url in that secret. so we can access that secret in the ci.yml file by using the syntax ${{ secrets.RENDER_DEPLOY_HOOK_URL }}. so we can trigger the deployment on Render using a webhook URL stored in the repository secrets.