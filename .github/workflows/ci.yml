# CI ( Continuous Integration )

name: simple backend ci       # name of the workflow

# TRIGGER

on:                           # trigger the workflow on push or pull request events to the main branch
  push:
    branches: [main]
  pull_request:
    branches: [main]
  path:
    Backend/**                # trigger the workflow only when changes are made in the Backend directory.

#INSTRUCTIONS

jobs:                         
  run-tests:                    # define a job named "run-tests" that runs on the latest version of Ubuntu. we use ubuntu-latest because it is a stable and widely used operating system that provides a consistent environment for running tests.
  
     runs-on: ubuntu-latest     

     steps:
       - name: get the code              # checkout the code from the repository using the actions/checkout action.
         uses: actions/checkout@v4

       - name: install node.js              # install the latest version of node.js
         uses: actions/setup-node@v4
         with:
            node-version: '20'

       - name: install dependencies         # install the dependencies defined in the package.json file using npm install command.
         run: npm install
         working-directory: ./Backend

       - name: run tests                    # run the tests defined in the package.json file using npm test command.
         run: npm test
         working-directory: ./Backend

# CD ( Continuous Deployment )

  deploy:
    needs: run-tests            # this job will only run if the "run-tests" job is successful.        

    runs-on: ubuntu-latest

    steps:
       - name: Trigger Render deploy
         run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"  # trigger the deployment on Render using a webhook URL stored in the repository secrets.





# 1) workflows always make in root directory of the project. so we have to create a folder named .github and inside that folder we have to create a folder named workflows and inside that folder we have to create a file named ci.yml. this is the path of the file .github/workflows/ci.yml. so by the help of path and working -directory we can run the tests of backend and frontend separately. so we have to create two files one for frontend and one for backend. so we have to create a file named frontend-ci.yml and backend-ci.yml. so in frontend-ci.yml we have to write the code for frontend and in backend-ci.yml we have to write the code for backend. so by the help of this we can run the tests of frontend and backend separately.

# my-monorepo/
# ├── .github/
# │   └── workflows/
# │       ├── frontend-ci.yml  <-- Handles React
# │       └── backend-ci.yml   <-- Handles Express
# ├── react-frontend/
# ├── Express-backend-1/
# └── Express-backend-2/

